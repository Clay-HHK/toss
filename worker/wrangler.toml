name = "toss-api"
main = "src/index.ts"
compatibility_date = "2025-04-01"

# D1 Database
# Run: npx wrangler d1 create toss-db
# Then paste the database_id below
[[d1_databases]]
binding = "TOSS_DB"
database_name = "toss-db"
database_id = "<YOUR_D1_DATABASE_ID>"

# R2 Bucket
# Run: npx wrangler r2 bucket create toss-storage
[[r2_buckets]]
binding = "TOSS_STORAGE"
bucket_name = "toss-storage"

# KV Namespace
# Run: npx wrangler kv namespace create TOSS_KV
# Then paste the id below
[[kv_namespaces]]
binding = "TOSS_KV"
id = "<YOUR_KV_NAMESPACE_ID>"

# Cron trigger for expired document cleanup (daily at 03:00 UTC)
[triggers]
crons = ["0 3 * * *"]

# Secrets (set via `wrangler secret put`):
# - JWT_SECRET          — HMAC key for auth + download-ticket JWTs
# - D1_ENCRYPTION_KEY   — (T1-5) base64url-encoded 32-byte key for envelope
#                          encryption of sensitive D1 text fields. Generate:
#                          openssl rand 32 | base64 | tr '+/' '-_' | tr -d '='
#                          Optional in dev (field is stored plaintext with a warn log).
# - MIGRATION_SECRET    — (T1-1) gate for POST /api/v1/admin/migrate/r2-keys.
#                          Leave unset in steady state; set temporarily when running
#                          a one-shot migration, then `wrangler secret delete` afterwards.
#                          Example:
#                          openssl rand -hex 32 | wrangler secret put MIGRATION_SECRET
#                          curl -X POST https://<worker>/api/v1/admin/migrate/r2-keys?dry_run=1 \
#                               -H "X-Migration-Secret: <secret>"
